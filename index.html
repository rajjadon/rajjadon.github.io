<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raj Pratap Singh Jadon - Portfolio</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=3" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=3" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3" />

    <!-- Security headers -->
    <!-- CSP allows the Kaily/Copilot chat widget (script.copilot.live loader + its
         api/cdn/platform/public subdomains, kaily.ai, fonts, and voice/video media). -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline' https://*.copilot.live https://*.kaily.ai;
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.copilot.live https://*.kaily.ai;
               font-src 'self' data: https://fonts.gstatic.com https://*.copilot.live https://*.kaily.ai;
               img-src 'self' data: blob: https:;
               media-src 'self' blob: https://*.copilot.live https://*.kaily.ai;
               worker-src 'self' blob:;
               connect-src 'self' https://*.copilot.live wss://*.copilot.live https://*.kaily.ai wss://*.kaily.ai https://fonts.googleapis.com;
               frame-src https://*.copilot.live https://*.kaily.ai;
               frame-ancestors 'none';">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">

    <!-- SEO -->
    <meta name="description" content="Portfolio of Raj Pratap Singh Jadon — SDE-2 Android at Fynd, building AI-powered mobile SDKs with Kotlin, Jetpack Compose, and LLMs.">
    <meta name="author" content="Raj Pratap Singh Jadon">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rajjadon.github.io">
    <meta property="og:title" content="Raj Pratap Singh Jadon — Portfolio">
    <meta property="og:description" content="SDE-2 Android • Fynd • Ex Ola Electric. Kotlin, Jetpack Compose, AI/LLM SDKs.">
    <meta property="og:image" content="https://rajjadon.github.io/profile.jpg">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Raj Pratap Singh Jadon — Portfolio">
    <meta name="twitter:description" content="SDE-2 Android • Fynd • Ex Ola Electric. Kotlin, Jetpack Compose, AI/LLM SDKs.">
    <meta name="twitter:image" content="https://rajjadon.github.io/profile.jpg">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Kaily / Copilot chat widget — loaded directly via script (public token) -->
    <script>
      (function (w, d, s, o, f, js, fjs) {
        w[o] = w[o] || function () { (w[o].q = w[o].q || []).push(arguments); };
        js = d.createElement(s); fjs = d.getElementsByTagName(s)[0];
        js.id = o;
        js.src = "https://script.copilot.live/v1/copilot.min.js?tkn=cat-6r8kty8r";
        js.async = 1; js.referrerPolicy = "origin";
        fjs.parentNode.insertBefore(js, fjs);
      })(window, document, "script", "copilot");
      copilot("init", {}, function () { window["_copilot_ready"] = true; });
    </script>
  </body>
</html>
